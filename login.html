<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PAUD · Operator sign in</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/auth-login.css">
</head>
<body class="auth-login-page" data-page="login">
  <div class="auth-login-wrap">
    <div class="auth-login-brand">PAUD</div>
    <p class="auth-login-sub">
      Operator portal — sign in with the email and password your soldier created for this operator account.
    </p>

    <form id="operator-login-form" novalidate>
      <div id="login-error" class="auth-login-error" role="alert" hidden></div>

      <div class="auth-field">
        <div class="auth-field-ico" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="20" height="16" x="2" y="4" rx="2"/>
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
          </svg>
        </div>
        <input
          type="email"
          id="op-email"
          name="email"
          autocomplete="email"
          placeholder="Enter your email"
          required
        />
      </div>

      <div class="auth-field">
        <div class="auth-field-ico" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <input
          type="password"
          id="op-password"
          name="password"
          autocomplete="current-password"
          placeholder="Enter your password"
          required
        />
      </div>

      <button type="submit" class="auth-btn-primary" id="operator-login-submit">LOGIN</button>
    </form>

    <p class="auth-login-foot">
      Same authentication as the PAUD mobile app (Firebase).<br />
      Configure <code style="font-size:0.68rem;">assets/js/firebase-config.js</code> if sign-in fails.
    </p>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="assets/js/firebase-config.js"></script>
  <script src="assets/js/operator-auth.js"></script>
  <script type="module" src="assets/js/paud-firestore.js"></script>
</body>
</html>
